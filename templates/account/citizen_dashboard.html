<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Dashboard</title>

<link rel="stylesheet" href="{% static 'account/css/dashboard.css' %}">

<style>
/*  Popup styling (top position) */
.popup {
    position: absolute;
    top: 70px; /* navbar ke just neeche */
    right: 20px;

    background: white;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 20px;
    width: 260px;

    display: none;
    z-index: 1000;
}

/* popup content */
.popup-box h3 {
    margin-bottom: 8px;
    font-size: 18px;
}

.popup-box p {
    font-size: 14px;
    color: #555;
}

/* buttons */
.popup-actions {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
}

.confirm-btn {
    background: #dc3545;
    color: white;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 5px;
    font-size: 14px;
}

.cancel-btn {
    background: #6c757d;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="dashboard">

    <div class="navbar">

        <h2>Nagrik Report</h2>

        <div class="nav-right">

            <span>
                Welcome <b>{{request.user.username}}</b>
            </span>

            <!-- Logout Button -->
            <a href="#" class="logout-btn" onclick="openLogoutPopup(); return false;">
                Logout
            </a>

            <!--  Popup yahi navbar ke andar rakho -->
            <div id="logoutPopup" class="popup">
                <div class="popup-box">
                    <h3>Are you sure?</h3>
                    <p>You want to logout</p>

                    <div class="popup-actions">
                        <a href="{% url 'logout' %}" class="confirm-btn">Yes</a>
                        <button onclick="closeLogoutPopup()" class="cancel-btn">No</button>
                    </div>
                </div>
            </div>

        </div>

    </div>


    <div class="cards">

        <div class="card">
            <h3>Create Complaint</h3>
            <p>Report a civic issue in your area</p>
            <a href="{% url 'create_complaint' %}" class="btn">Create</a>
        </div>

        <div class="card">
            <h3>My Complaints</h3>
            <p>Track status of your complaints</p>
            <a href="{% url 'my_complaints' %}" class="btn">View</a>
        </div>

        <div class="card">
            <h3>Profile</h3>
            <p>View and update your details</p>
            <a href="{% url 'user_profile' %}" class="btn">Profile</a>
        </div>

    </div>

</div>


<script>
function openLogoutPopup() {
    document.getElementById("logoutPopup").style.display = "block";
}

function closeLogoutPopup() {
    document.getElementById("logoutPopup").style.display = "none";
}

// click outside → close
window.onclick = function(event) {
    const popup = document.getElementById("logoutPopup");
    const btn = document.querySelector(".logout-btn");

    if (popup.style.display === "block" && 
        !popup.contains(event.target) && 
        event.target !== btn) {
        popup.style.display = "none";
    }
}
</script>

</body>
</html>
