<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'account/css/register.css' %}">
</head>

<body>

<div class="container">

    <form method="POST" class="register-form">
        {% csrf_token %}

        <h2>Login</h2>

        <input 
            type="text" 
            name="username" 
            placeholder="Enter Username"
            required
        >

        <input 
            type="password" 
            name="password" 
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
