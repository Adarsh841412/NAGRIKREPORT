<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Officer Login</title>

<link rel="stylesheet" href="{% static 'account/css/officer_login.css' %}">

</head>

<body>

<div class="container">

<form method="POST" class="login-form">

{% csrf_token %}

{% if messages %}

{% for message in messages %}

<p style="color:red; margin-bottom:15px;">

{{message}}

</p>

{% endfor %}

{% endif %}


<h2>Officer Login</h2>

<p class="subtitle">Authorized Personnel Only</p>

<input 
type="text" 
name="username" 
placeholder="Enter Officer Username"
required
>

<input 
type="password" 
name="password" 
placeholder="Enter Password"
required
>

<button type="submit">

Login as Officer

</button>

<a href="{% url 'login' %}" class="switch">

Login as Citizen instead

</a>

</form>

</div>

</body>

</html>
